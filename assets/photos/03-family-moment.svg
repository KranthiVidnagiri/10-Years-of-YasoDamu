<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1600" role="img" aria-labelledby="title desc">
  <title id="title">Family Moment Placeholder</title>
  <desc id="desc">Placeholder artwork for the family moment photo in the anniversary slideshow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#54301e"/>
      <stop offset="55%" stop-color="#be7b43"/>
      <stop offset="100%" stop-color="#2b150d"/>
    </linearGradient>
  </defs>
  <rect width="900" height="1600" fill="url(#bg)"/>
  <rect width="900" height="1600" fill="#ffe0a5" fill-opacity=".09"/>
  <g fill="#fff0cb" fill-opacity=".2">
    <circle cx="280" cy="760" r="112"/>
    <circle cx="450" cy="680" r="135"/>
    <circle cx="620" cy="760" r="112"/>
    <rect x="220" y="860" width="460" height="240" rx="140"/>
  </g>
  <g fill="#fff0d0" fill-opacity=".88" font-family="Georgia, serif" text-anchor="middle">
    <text x="450" y="230" font-size="66" letter-spacing="11">FAMILY MOMENT</text>
    <text x="450" y="1260" font-size="40" letter-spacing="8">Place your cherished family photo here</text>
  </g>
</svg>
