    <text x="450" y="1260" font-size="40" letter-spacing="8">End the story with your newest memory</text>
  </g>
  <g fill="#fff6e2" fill-opacity=".18">
    <path d="M450 550 478 700 630 700 508 789 555 944 450 852 345 944 392 789 270 700 422 700Z"/>
