<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1600" role="img" aria-labelledby="title desc">
  <title id="title">Latest Photo Placeholder</title>
  <desc id="desc">Placeholder artwork for the latest photo in the anniversary slideshow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4a2317"/>
      <stop offset="50%" stop-color="#c88448"/>
      <stop offset="100%" stop-color="#1d0c08"/>
    </linearGradient>
    <radialGradient id="goldBurst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe8b4" stop-opacity=".86"/>
      <stop offset="100%" stop-color="#ffe8b4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="900" height="1600" fill="url(#bg)"/>
